<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | The Learning Index</title>
    <meta
      name="description"
      content="Contact The Learning Index for training, district support, product questions, and professional learning updates."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/global.css?v=11" />
    <link rel="stylesheet" href="styles/nav.css?v=11" />
    <link rel="stylesheet" href="styles/footer.css?v=11" />
    <link rel="stylesheet" href="styles/contact.css?v=11" />
  </head>
  <body>
    <div data-include="nav"></div>

    <main>
      <header class="page-hero page-hero--light contact-hero">
        <div class="container">
          <span class="badge page-eyebrow label">Contact</span>
          <h1>Contact Us</h1>
          <p class="page-hero-lead">
            Questions about services, products, or professional learning? We look forward to hearing from you.
          </p>
          <p class="contact-email-line">
            <a href="mailto:admin@thelearningindex.com">admin@thelearningindex.com</a>
          </p>
        </div>
      </header>

      <section class="section" id="join-list">
        <div class="container contact-layout">
          <div class="contact-form-panel">
            <p class="contact-form-note">
              Complete the form below. Submissions are processed through our secure contact system.
            </p>
            <div class="flodesk-form-embed" data-uid="" id="flodesk-embed" hidden></div>

            <form
              class="contact-form contact-form--fallback"
              name="contact"
              method="POST"
              data-netlify="true"
              netlify-honeypot="bot-field"
            >
              <input type="hidden" name="form-name" value="contact" />
              <p class="sr-only">
                <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
              </p>

              <div class="form-row form-row--2">
                <div class="form-field">
                  <label for="first-name">First Name</label>
                  <input id="first-name" name="first_name" type="text" autocomplete="given-name" required />
                </div>
                <div class="form-field">
                  <label for="last-name">Last Name</label>
                  <input id="last-name" name="last_name" type="text" autocomplete="family-name" required />
                </div>
              </div>

              <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required />
              </div>

              <div class="form-field">
                <label for="mobile">Mobile Number</label>
                <input id="mobile" name="mobile" type="tel" autocomplete="tel" />
              </div>

              <div class="form-field">
                <label for="help">How Can We Help You?</label>
                <select id="help" name="help_topic" required>
                  <option value="">Select an option</option>
                  <option value="services">Services &amp; district support</option>
                  <option value="products">Products (Redact AI)</option>
                  <option value="evaled">EVALed™</option>
                  <option value="training">Professional development</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="form-field">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
              </div>

              <button type="submit" class="btn btn--primary btn--block">Send Message</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div data-include="footer"></div>
    <script src="scripts/tli-config.js?v=10" defer></script>
    <script src="scripts/flodesk.js?v=10" defer></script>
    <script src="scripts/site.js?v=10" defer></script>
  </body>
</html>
